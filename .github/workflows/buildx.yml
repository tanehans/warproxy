name: buildx

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'README.md'
      - 'docker-compose.yml'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  buildx:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Resolve base image tag
        id: base_tag
        run: |
          set -euo pipefail
          for tag in 3.22 3.21 3.20 3.19; do
            if docker buildx imagetools inspect ghcr.io/linuxserver/baseimage-alpine:${tag} >/dev/null 2>&1; then
              echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "Using base image tag ${tag}"
              exit 0
            fi
          done
          echo "No compatible ghcr.io/linuxserver/baseimage-alpine tag found" >&2
          exit 1
      - name: Load Built Image and Test
        run: |
          docker buildx build \
            -t ${{ env.IMAGE_NAME }}:testing \
            --platform=linux/amd64 \
            --build-arg LSIO_BASE_TAG=${{ steps.base_tag.outputs.tag }} \
            --load \
            .
          CID=$(docker run -d ${{ env.IMAGE_NAME }}:testing)
          sleep 5s
          if [ $(docker exec -i $CID wireproxy --help | head -1 | cut -d ' ' -f2) != "wireproxy" ]; then          
            exit 1
          fi
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Buildx and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: |
            LSIO_BASE_TAG=${{ steps.base_tag.outputs.tag }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64
          push: true
