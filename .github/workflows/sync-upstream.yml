name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync fork with upstream/main
        run: |
          set -euo pipefail

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/kingcc/warproxy.git
          else
            git remote add upstream https://github.com/kingcc/warproxy.git
          fi

          git fetch upstream main
          git checkout main

          if git merge --no-edit upstream/main; then
            git push origin main
            echo "Upstream sync completed"
          else
            echo "Automatic sync failed due to merge conflicts"
            exit 1
          fi
